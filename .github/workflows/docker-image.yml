name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with: 
        fetch-depth: 0

    - name: Docker login
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        TOKEN_PASSWORD: ${{ secrets.TOKEN_PASSWORD }}
      run: |
        echo "Iniciando Login"
        docker login -u $DOCKER_USER -p $TOKEN_PASSWORD
        echo "Fin del login"
    
    - name: Build Docker image
      run: |
        docker build -t jplara/docker-graphql:0.0.1 .
        docker build -t jplara/docker-graphql:latest .

    - name: 
      run: |
        docker push jplara/docker-graphql:0.0.1 
        docker push jplara/docker-graphql:latest
