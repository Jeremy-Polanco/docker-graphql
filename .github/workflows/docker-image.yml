name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with: 
        fetch-depth: 0

    - name: Git Semantic Version
      uses: PaulHatch/semantic-version@v4.0.3
      with:
        major_pattern: "major:"
        minor_patter: "feat:"
        format: "${major}.${minor}.${patch}-prerelease{increment}"
      id: version
        
    - name: Docker login
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        TOKEN_PASSWORD: ${{ secrets.TOKEN_PASSWORD }}
      
      run: |
        echo "Iniciando Login"
        docker login -u $DOCKER_USER -p $TOKEN_PASSWORD
        echo "Fin del login"
        echo "New version: $NEW_VERSION"
    
    - name: Build Docker image
      env:
        NEW_VERSION: ${{ steps.version.outputs.version }}
      run: |
        docker build -t jplara/docker-graphql:$NEW_VERSION .
        docker build -t jplara/docker-graphql:latest .

    - name:  Push docker image
      env:
        NEW_VERSION: ${{ steps.version.outputs.version }}
      run: |
        docker push jplara/docker-graphql:$NEW_VERSION 
        docker push jplara/docker-graphql:latest
